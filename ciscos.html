<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сертифікати Cisco</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #1f2937;
      background: #f3f6fb;
    }

    header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }

    header p {
      font-size: 20px;
      opacity: 0.95;
    }

    nav {
      background: #111827;
      padding: 14px 20px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #93c5fd;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    section {
      background: white;
      margin-bottom: 25px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    section h2 {
      color: #1e3a8a;
      margin-bottom: 15px;
      font-size: 28px;
    }

    section p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .button {
      display: block;
      padding: 22px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    .button:hover {
      background: #1e3a8a;
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      padding: 25px;
      background: #111827;
      color: white;
      margin-top: 40px;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 32px;
      }

      nav a {
        display: inline-block;
        margin: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Сертифікати Cisco</h1>
    <p>Мої сертифікати, бейджі та досягнення Cisco</p>
  </header>

  <nav>
    <a href="index.html">Головна</a>
    <a href="sert.html">Сертифікати</a>
  </nav>

  <main>
    <section>
      <h2>Cisco</h2>
      <p>Оберіть потрібний розділ для перегляду інформації.</p>

      <div class="buttons">
        <a 
          href="https://docs.google.com/document/d/1kONyl7JCtALbevAE7g1oq-BcL9uGfoAqGV_CxFUFKSk/edit?hl=ru&tab=t.0" 
          class="button" 
          target="_blank"
        >
          Сертифікати
        </a>

        <a 
          href="https://docs.google.com/document/d/1kMZk-J3JLlEX8-8jM6yNfdceNfud6ICi_ca32vBuszY/edit?tab=t.0" 
          class="button" 
          target="_blank"
        >
          Бейджі
        </a>

        <a 
          href="https://docs.google.com/document/d/1DYOJnZvS15WiQTahrbgVMkm_zndogFWEJ9hD4N_561s/edit?tab=t.0" 
          class="button" 
          target="_blank"
        >
          Досягнення
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Кравчук Арсеній Юрійович. Усі права захищено.</p>
  </footer>
</body>
</html>
